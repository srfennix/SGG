<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arthur Inicio - Administrador de Gastos</title>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <select id="idioma">
    <option value="es">Español</option>
    <option value="en">English</option>
    <option value="pt">Português</option>
    <option value="fr">Français</option>
    <option value="it">Italiano</option>
    <option value="de">Deutsch</option>
    <option value="ru">Русский</option>
    <option value="zh">中文</option>
    <option value="ja">日本語</option>
    <option value="ar">العربية</option>
  </select>

  <button id="temaBtn" class="tema-btn">🌙</button>

  <div class="contenedor">
    <div class="logo">💵</div>

    <h1 id="titulo">Arthur Inicio</h1>
    <h3 id="subtitulo">Administrador de Gastos</h3>

    <div class="version">v1.0.2</div>

    <form id="loginForm">
      <input type="text" id="usuario" placeholder="Usuario" required>

      <input type="password" id="password" placeholder="Contraseña" required>

      <div class="mostrar-pass">
        <input type="checkbox" id="mostrarPass">
        <label for="mostrarPass">Mostrar contraseña</label>
      </div>

      <button type="submit" id="btnLogin">Ingresar</button>
    </form>

    <div id="mensaje"></div>

    <footer>&copy; 2026 Arthur Inc. Todos los derechos reservados.</footer>
  </div>

  <script src="js/login.js"></script>

</body>
</html>
